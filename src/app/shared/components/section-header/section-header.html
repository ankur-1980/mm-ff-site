<header class="section-header">
  <div class="section-header__main">
    @if (label()) {
      <p class="section-header__label">{{ label() }}</p>
    }
    <h1 class="section-header__heading">{{ heading() || '—' }}</h1>
  </div>

  @if (meta().length) {
    <div class="section-header__meta" role="list" aria-label="Section metadata">
      @for (item of meta(); track $index) {
        <span class="section-header__meta-item" role="listitem">{{ item }}</span>
      }
    </div>
  }

  @if (secondaryMeta().length) {
    <div
      class="section-header__meta section-header__meta--secondary"
      role="list"
      aria-label="Additional section metadata"
    >
      @for (item of secondaryMeta(); track $index) {
        <span class="section-header__meta-item" role="listitem">{{ item }}</span>
      }
    </div>
  }

  <div class="section-header__extra"><ng-content select="[sectionHeaderExtra]"></ng-content></div>
</header>
