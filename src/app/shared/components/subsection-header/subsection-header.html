@if (isPrimary()) {
  <h2 class="subsection-header subsection-header--primary">
    <span class="subsection-header__line" aria-hidden="true"></span>
    <span class="subsection-header__title">{{ title() }}</span>
    <span class="subsection-header__line" aria-hidden="true"></span>
  </h2>
} @else {
  <h3 class="subsection-header subsection-header--secondary">
    <span class="subsection-header__line" aria-hidden="true"></span>
    <span class="subsection-header__title">{{ title() }}</span>
    <span class="subsection-header__line" aria-hidden="true"></span>
  </h3>
}
