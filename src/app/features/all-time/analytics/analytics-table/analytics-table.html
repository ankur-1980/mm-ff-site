<app-subsection-header title="All-Time Statistics" [isPrimary]="false"></app-subsection-header>
@if (tableState().data.length) {
  <app-data-table
    class="all-time-analytics-view__table"
    [columns]="tableState().columns"
    [data]="tableState().data"
    defaultSortDirection="desc"
  />
} @else {
  <p class="all-time-analytics-view__empty">No all-time analytics table data available.</p>
}
