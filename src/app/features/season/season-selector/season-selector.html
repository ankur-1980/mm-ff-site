<mat-form-field class="season-selector" appearance="outline" subscriptSizing="dynamic">
  <mat-select
    aria-label="Season"
    [value]="activeYear()"
    (valueChange)="onYearChange($event)"
  >
    @for (year of years(); track year) {
      <mat-option [value]="year">{{ year }}</mat-option>
    }
  </mat-select>
</mat-form-field>
