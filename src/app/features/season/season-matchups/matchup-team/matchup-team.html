<section
  class="team"
  [class.team--winner]="result() === 'winner'"
  [class.team--loser]="result() === 'loser'"
>
  <header class="team__header">
    <span class="team__name">{{ teamName() }}</span>
    <span class="team__owner">{{ ownerName() }}</span>
  </header>

  <mat-divider class="team__divider" />

  <div class="team__content">
    <span class="team__points">{{ totalPoints() | number: '1.2-2' }}</span>
    @if (projectedPoints()) {
      <span class="team__projected">{{ projectedPoints() | number: '1.2-2' }} proj</span>
    }
  </div>

  <mat-divider class="team__divider" />

  <footer class="team__footer">
    @if (result()) {
      <span class="team__result">{{ result() === 'winner' ? 'Winner' : 'Loser' }}</span>
    }
  </footer>
</section>
